name: CI

on:
  push:
    branches:
      - main
    #   - dev
  pull_request:
    branches:
      - main
    #   - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-site-checks:
    name: Static site checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

        # TODO: Re-enable formatting check once we have a consistent style and a formatter in place.
        # Prettier formatting
    #   - name: Check formatting
    #     run: npm run format:check

      - name: Lint JavaScript
        run: npm run lint:js

        # TODO: Re-enable HTML validation once we have a consistent style and the necessary configuration in place.
        # html-validate
    #   - name: Validate HTML
    #     run: npm run lint:html

      - name: Verify public site files exist
        run: |
          test -f public/index.html
          test -d public/assets

      - name: Check links
        run: npm run check:links
